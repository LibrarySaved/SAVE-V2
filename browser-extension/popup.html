<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveStack</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
      padding: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #9333ea, #ec4899, #f97316);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo svg {
      width: 18px;
      height: 18px;
      fill: white;
    }
    
    .title {
      font-size: 18px;
      font-weight: 700;
      color: #18181b;
    }
    
    .title span {
      font-size: 10px;
      background: linear-gradient(135deg, #9333ea20, #ec489920);
      color: #9333ea;
      padding: 2px 6px;
      border-radius: 20px;
      margin-left: 6px;
      font-weight: 600;
    }
    
    .page-info {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #e4e4e7;
    }
    
    .page-title {
      font-size: 13px;
      font-weight: 600;
      color: #18181b;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .page-url {
      font-size: 11px;
      color: #71717a;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 20px;
      margin-top: 8px;
    }
    
    .platform-instagram { background: linear-gradient(135deg, #833AB4, #FD1D1D, #FCB045); color: white; }
    .platform-tiktok { background: #000; color: white; }
    .platform-youtube { background: #FF0000; color: white; }
    .platform-twitter { background: #000; color: white; }
    .platform-pinterest { background: #E60023; color: white; }
    .platform-linkedin { background: #0A66C2; color: white; }
    .platform-facebook { background: #1877F2; color: white; }
    .platform-other { background: #2563EB; color: white; }
    
    .save-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #9333ea, #ec4899, #f97316);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    
    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(147, 51, 234, 0.3);
    }
    
    .save-btn:active {
      transform: translateY(0);
    }
    
    .save-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }
    
    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 11px;
      color: #a1a1aa;
    }
    
    .footer a {
      color: #9333ea;
      text-decoration: none;
    }
    
    .ai-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #71717a;
      margin-top: 12px;
      padding: 8px;
      background: linear-gradient(135deg, #9333ea08, #ec489908);
      border-radius: 8px;
      border: 1px solid #9333ea20;
    }
    
    .ai-badge svg {
      width: 14px;
      height: 14px;
      fill: #9333ea;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <div class="title">SaveStack <span>AI</span></div>
  </div>
  
  <div class="page-info">
    <div class="page-title" id="pageTitle">Loading...</div>
    <div class="page-url" id="pageUrl"></div>
    <div class="platform-badge platform-other" id="platformBadge">other</div>
  </div>
  
  <button class="save-btn" id="saveBtn">
    <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>
    Sauvegarder dans SaveStack
  </button>
  
  <div class="ai-badge">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    L'IA analysera automatiquement ce contenu
  </div>
  
  <div class="footer">
    <a href="https://social-hub-687.preview.emergentagent.com" target="_blank">Ouvrir SaveStack</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
